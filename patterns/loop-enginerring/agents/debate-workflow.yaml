name: "求真辨伪：全流程辩论工作流"
description: "搜集争议话题 → 审核筛选 → 质疑者与推理者反复辩论 → 裁判者总结 → Skill优化者判断是否沉淀 → 同步角色能力 → 记录问询"

agents_dir: "agents/roles"

# 输出路径
output:
  process_dir: "debates/process"      # 辩论过程记录
  result_dir: "debates/conclusions"   # 裁判结论
  case_dir: "skills/truth-discovery/cases"  # 案例沉淀
  skill_file: "skills/truth-discovery/SKILL.md"  # 辩证法主干
  reference_dir: "skills/truth-discovery/references"  # 专题长参考
  inquiry_log: "docs/inquiry-log.md"  # 问询记录

llm:
  provider: deepseek
  model: deepseek-chat

concurrency: 1

inputs:
  - name: topic
    description: "待求真的主题（可选。如不提供，搜集者将从 topics.md 中选取）"
    required: false
  - name: search_domain
    description: "搜索领域（可选）"
    required: false

steps:
  # ── 第 0 步：话题搜集者 ──
  - id: collector_search
    role: "collector"
    name: "话题搜集者"
    emoji: "🔍"
    task: |
      搜索和审核值得辩论的求真话题：

      ## 用户指定话题（如有）
      {{topic}}

      ## 搜索领域（如有）
      {{search_domain}}

      ## 你的任务
      1. 如果用户已提供话题，直接审核并精炼，跳过搜索
      2. 如果用户未提供话题，从 `debates/topics.md` 中选取未辩论话题，或搜索争议性话题
      3. 按八维度打分（争议性/可验证性/分层空间/知识价值/红旗密度/隐匿密度/异常聚类密度/品牌化程度）
      4. 筛选总分 ≥ 25/40 的话题
      5. 精炼入选话题为适合辩论的精准表述

      ## 输出要求
      ### 话题搜集报告
      - 搜集范围
      - 话题审核（八维度评分表）
      - 入选话题及理由
      - 精炼后的话题表述

      要求：宁缺毋滥。优先选择高隐匿密度、高异常聚类密度、高品牌化程度的话题。
    output: collector_report

  # ── 第 1 步：质疑者开第一枪 ──
  - id: challenger_round_1
    role: "challenger"
    name: "质疑者"
    emoji: "🔴"
    task: |
      针对以下主题，提出你的首轮质疑：

      ## 待求真主题
      {{topic}}

      ## 输出要求
      ### 命题拆分
      将主题拆成各层（人物/事件/文本/归属/学派/传承/包装），标注每层的可疑程度。

      ### 核心质疑（至少 3 个）
      每个质疑要具体、有场景感、指向明确的证据缺口或逻辑矛盾。

      ### 红旗标记
      列出你发现的所有红旗信号（参考28条红旗清单）。

      ### 待追问的问题清单（至少 5 个）
      这些问题将驱动下一轮辩论。

      要求：不要泛泛而谈，每个质疑都要指向具体的证据链断裂点或利益动机。语气要犀利但不阴谋论。
    output: challenger_output

  # ── 第 2 步：推理者首次回应 ──
  - id: reasoner_round_1
    role: "reasoner"
    name: "推理者"
    emoji: "🟢"
    task: |
      质疑者已提出质疑，请逐一回应：

      ## 待求真主题
      {{topic}}

      ## 质疑者的质疑
      {{challenger_output}}

      ## 输出要求
      ### 逐条回应
      对质疑者的每个核心质疑，给出：质疑点复述、现有证据（标注等级 S/S⁻/A/B/C/D/E）、回应分析、承认的不确定性。

      ### 分层归属判断
      对主题的各层给出归属阶梯判断（人物/学派/编订/语料库/协作生态/品牌/改写/神话）。

      ### 反质疑
      指出质疑者论证中的漏洞或过度推断之处。

      ### 待澄清的问题

      要求：不回避质疑，不强行辩护。承认不确定性，但给出最可能的解释。每个回应都要有证据等级标注。
    output: reasoner_output

  # ── 第 3 步：质疑者第二轮（循环起点） ──
  - id: challenger_round
    role: "challenger"
    name: "质疑者"
    emoji: "🔴"
    task: |
      推理者已回应你的上一轮质疑，请继续深挖：

      ## 待求真主题
      {{topic}}

      ## 你的上一轮质疑
      {{challenger_output}}

      ## 推理者的回应
      {{reasoner_output}}

      ## 你的任务
      仔细审视推理者的回应，找出其中：
      1. 证据等级不足的断言（用 C/D/E 级证据支撑强宣称）
      2. 逻辑跳跃或循环论证
      3. 回避的核心问题
      4. 未充分解释的黑箱（传承链断裂、突然跃迁等）
      5. 利益动机未充分审视的环节
      6. 是否使用了"承认小错、坚持大结论"防御模式

      ## 输出要求
      ### 对推理者回应的逐条反驳
      ### 新发现的质疑点
      ### 本轮核心追问（至少 3 个）
      ### 是否还有未解决的问题？
      "无新问题" 或 "继续"

      要求：不要重复之前的质疑。每一轮都要比上一轮更深一层。如果推理者的回应确实解决了你的疑虑，要诚实承认。
    output: challenger_output
    depends_on: [reasoner_round_1]

  # ── 第 4 步：推理者回应（循环体） ──
  - id: reasoner_round
    role: "reasoner"
    name: "推理者"
    emoji: "🟢"
    task: |
      质疑者已对你的上一轮回应提出新的质疑，请继续回应：

      ## 待求真主题
      {{topic}}

      ## 质疑者的新一轮质疑
      {{challenger_output}}

      ## 你的上一轮回应
      {{reasoner_output}}

      ## 输出要求
      ### 逐条回应新质疑
      质疑点复述、现有证据（标注等级）、回应分析、承认的不确定性。

      ### 修正或补充
      如果之前的判断需要修正，请明确修正。

      ### 对质疑者论证的评估
      质疑者的论证质量如何？哪些质疑有道理，哪些是过度怀疑？

      ### 是否还有需要澄清的问题？
      "可结案" 或 "继续"

      要求：保持理性诚实。如果质疑者提出了你无法回答的问题，直接承认。不要为了辩护而辩护。
    output: reasoner_output
    depends_on: [challenger_round]

  # ── 循环：质疑者继续追问 ──
  - id: challenger_loop
    role: "challenger"
    name: "质疑者"
    emoji: "🔴"
    task: |
      推理者已回应，请继续深挖或宣布无新问题：

      ## 待求真主题
      {{topic}}

      ## 推理者的最新回应
      {{reasoner_output}}

      ## 你的上一轮质疑
      {{challenger_output}}

      ## 输出要求
      ### 对推理者最新回应的评估
      ### 最终质疑（如有）
      ### 结案判断
      - "无新问题，可结案" — 如果所有核心问题都已充分辩论
      - "继续" — 如果仍有实质性未解决问题

      要求：如果连续两轮没有提出实质性新问题，应该宣布可结案。不要为了凑轮数而重复质疑。
    output: challenger_output
    depends_on: [reasoner_round]
    loop:
      back_to: reasoner_round
      max_iterations: 98
      exit_condition: "{{challenger_output}} contains 无新问题"

  # ── 第 5 步：裁判者总结 → 保存到 debates/结果/ ──
  - id: judge_summary
    role: "judge"
    name: "裁判者"
    emoji: "⚖️"
    task: |
      质疑者与推理者已完成多轮辩论，请做最终裁决和总结：

      ## 待求真主题
      {{topic}}

      ## 完整辩论记录
      ### 质疑者首轮质疑
      {{challenger_round_1}}

      ### 推理者首轮回应
      {{reasoner_round_1}}

      ### 质疑者最终立场
      {{challenger_output}}

      ### 推理者最终立场
      {{reasoner_output}}

      ## 输出要求
      请输出最终求真报告（保存到 `debates/结果/{topic-slug}.md`）：

      ---

      # 求真辨伪报告：{{topic}}

      ## 一、简短判断
      一句话总结核心结论。

      ## 二、命题拆分与分层判断
      | 层 | 问题 | 判断 | 证据等级 | 置信度 |

      ## 三、证据时间线
      从声称起源到现在的关键节点，标注每个节点的证据等级和可信度。

      ## 四、知识谱系
      前置条件、同代验证、后续承接、断裂点与黑箱。

      ## 五、动机、恩怨与利益图
      谁从当前叙事中获益？谁在维护它？谁受损？旧仇、翻案、清算和正统需求如何影响记录？

      ## 六、人民史观与发展论检查
      - 是否把普通人的生产、生活、迁徙、习俗和身体记忆纳入解释？
      - 是否说明对象如何生成、积累、断裂、转化和制度化？
      - 是否避免把历史压缩成帝王将相、圣人作者或胜者档案？

      ## 七、辩论质量评估
      - 质疑者最强论点（Top 3）
      - 推理者最强辩护（Top 3）
      - 推理者修正的立场（本轮核心成果）
      - 双方均承认的不确定性
      - 未解决的争议点

      ## 八、分层结论
      使用归属阶梯给出最终判断。整体最可能解释。

      ## 九、置信度与不确定性
      整体置信度、最大不确定性来源、什么新证据可以改变结论。

      ## 十、判断标签
      使用精确标签：已确认 / 高度可能 / 合理 / 待证 / 永久待证 / 过度宣称 / 归属错误 / 品牌化 / 已证伪

      ---

      要求：每个判断都要有依据。不要模棱两可。承认不确定性但给出最可能解释。辩论裁判必须同时检查证据标准、人民史观、发展论、恩怨利害和解释力。报告要能经得起第三方复核。
    output: final_report
    depends_on: [challenger_loop]

  # ── 第 6 步：Skill 优化者 → 沉淀 + 同步角色 + 记录问询 ──
  - id: optimizer_review
    role: "optimizer"
    name: "Skill优化者"
    emoji: "🛠️"
    task: |
      辩论已结束，裁判者已给出分层结论。请完成以下四项任务：

      ## 待求真主题
      {{topic}}

      ## 话题搜集报告
      {{collector_report}}

      ## 裁判者最终报告
      {{final_report}}

      ## 任务一：审查是否沉淀到 skill 知识库
      1. 评估方法论增量（新红旗信号/新证据模式/新归属模式/新动机模式/新隐匿模式/方法论修正）
      2. 评估案例价值（典型性/辩论质量/结论清晰度/教育价值/可复用性，各5分）
      3. 按入库决策矩阵做出判断

      ## 任务二：同步角色能力
      检查以下角色是否需要更新：
      - Challenger：是否有新红旗信号需要加入武器库？
      - Reasoner：是否有新证据模式需要加入武器库？
      - Judge：是否有新归属/动机模式需要加入武器库？
      - Collector：是否有新审核维度需要加入评分体系？
      - Optimizer：是否需要更新增量类型清单？
      如需同步，指明具体添加到哪个文件的哪个位置。

      ## 任务三：更新辩题库
      在 `debates/topics.md` 中将本辩题标注为 ✅。

      ## 任务四：记录问询
      将本次辩论记录到 `docs/inquiry-log.md`，标注为"需求"。

      ## 输出要求
      ### Skill 优化报告
      - 辩论概要
      - 方法论增量评估
      - 案例价值评估（五维度打分）
      - 入库决策（入库方法论+案例 / 仅入库方法论 / 仅入库案例 / 不入库）
      - 入库内容（如适用）
      - 角色能力同步（如适用）
      - 不入库说明（如适用）

      要求：严格把关，宁缺毋滥。先判断沉淀位置：通用原则进 SKILL.md，专题长参考进 references/，可复用样本进 cases/。SKILL.md 只保留辩证法主干。角色同步必须在 24 小时内完成。
    output: optimizer_report
    depends_on: [judge_summary]
